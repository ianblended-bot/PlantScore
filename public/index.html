<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PlantScore" />
  <title>PlantScore</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --green:#0F6E56;--green-dark:#085041;--green-bg:#E1F5EE;
      --amber:#BA7517;--amber-bg:#FAEEDA;
      --red:#A32D2D;--red-bg:#FCEBEB;
      --text:#1a1a1a;--text-mid:#555;--text-light:#888;
      --border:#ddd;--border-light:#eee;
      --bg:#fff;--bg-off:#f8f8f6;--bg-sec:#f2f2f0;
      --r:10px;--rs:6px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-off);color:var(--text)}
    body{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
    .screen{display:none;flex:1;flex-direction:column;overflow-y:auto;padding:20px 16px 100px}
    .screen.active{display:flex}
    .logo{font-size:26px;font-weight:600;margin-bottom:4px}.logo span{color:var(--green)}
    .tagline{font-size:13px;color:var(--text-light);margin-bottom:28px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--text-mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
    .field input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--rs);font-size:15px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
    .field input:focus{border-color:var(--green)}
    .btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:13px;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
    .btn:active{opacity:.85}.btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary{background:var(--green);color:#fff}
    .btn-outline{background:var(--bg);color:var(--text);border:1px solid var(--border);font-weight:500;margin-top:8px}
    .btn-danger{background:var(--bg);color:var(--red);border:1px solid #f0c0c0;font-weight:500;margin-top:8px}
    .btn-sm{padding:8px 14px;font-size:13px;font-weight:500;width:auto;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;display:flex;align-items:center;gap:5px}
    .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:1px solid var(--border-light);display:none;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .nav.visible{display:flex}
    .nav-btn{flex:1;padding:10px 2px 8px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-light);font-size:9px;font-weight:500;border-top:2px solid transparent}
    .nav-btn i{font-size:18px}.nav-btn.active{color:var(--green);border-top-color:var(--green)}
    .hbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border-light)}
    .hbar-left .site{font-size:11px;color:var(--text-light);margin-bottom:2px}
    .hbar-left .auditor{font-size:15px;font-weight:600}
    .ztag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:var(--green-bg);color:var(--green-dark);padding:3px 9px;border-radius:20px;margin-top:4px}
    .up-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .up-btn{padding:14px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;font-weight:500}
    .up-btn i{font-size:22px;color:var(--green)}.up-btn:active{background:var(--bg-sec)}
    input[type=file]{display:none}
    .thumb-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .thumb{width:64px;height:64px;border-radius:var(--rs);object-fit:cover;border:1px solid var(--border-light)}
    .zone-row{display:flex;gap:8px;margin-bottom:14px}
    .zone-row input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;background:var(--bg);color:var(--text);outline:none}
    .zone-row input:focus{border-color:var(--green)}
    .zone-row button{padding:10px 16px;background:var(--green);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer}
    .card{border:1px solid var(--border-light);border-radius:var(--r);padding:14px;margin-bottom:12px;background:var(--bg)}
    .card-img{width:100%;height:auto;max-height:340px;object-fit:contain;border-radius:var(--rs);margin-bottom:12px;background:var(--bg-sec)}
    .img-num{font-size:11px;color:var(--text-light);margin-bottom:3px}
    .plant-name{font-size:14px;font-weight:600;margin-bottom:8px}
    .scores{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
    .sp{font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px}
    .sh{background:var(--green-bg);color:var(--green-dark)}
    .sm{background:var(--amber-bg);color:#5a3800}
    .sl{background:var(--red-bg);color:var(--red)}
    .overall{font-size:14px;font-weight:700;margin-bottom:6px}
    .ilbl{font-size:11px;font-weight:700;color:var(--text-mid);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
    .ibody{font-size:13px;color:var(--text-mid);line-height:1.6}
    .rbox{margin-top:10px;padding:10px 12px;background:var(--bg-off);border-left:3px solid var(--green);border-radius:0 var(--rs) var(--rs) 0}
    .rlbl{font-size:11px;font-weight:700;color:var(--text);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
    .rbody{font-size:13px;color:var(--text-mid);line-height:1.6}
    .loading{border:1px solid var(--border-light);border-radius:var(--r);padding:24px;text-align:center;background:var(--bg-sec);margin-bottom:12px}
    .spinner{width:26px;height:26px;border:2.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading p{font-size:13px;color:var(--text-light)}
    .sum-card{border:1px solid var(--border-light);border-radius:var(--r);padding:14px;background:var(--bg-off);margin-bottom:10px}
    .sum-title{font-size:13px;font-weight:700;margin-bottom:6px}
    .sum-body{font-size:13px;color:var(--text-mid);line-height:1.65}
    .avg-num{font-size:32px;font-weight:700;line-height:1}
    .avg-label{font-size:12px;color:var(--text-light);margin-top:3px}
    .act-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .act-btn{padding:11px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
    .act-btn:active{background:var(--bg-sec)}
    textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;background:var(--bg);color:var(--text);resize:vertical;min-height:80px;outline:none;font-family:inherit}
    textarea:focus{border-color:var(--green)}
    .note-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-light)}
    .note-text{flex:1;font-size:13px;line-height:1.55}
    .note-del{background:none;border:none;cursor:pointer;color:var(--text-light);font-size:16px;padding:2px;flex-shrink:0}
    .zgroup{margin-bottom:18px}
    .zgroup-title{font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border-light)}
    .hist-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-light)}
    .hist-thumb{width:48px;height:48px;border-radius:var(--rs);object-fit:cover;border:1px solid var(--border-light);flex-shrink:0}
    .hist-ph{width:48px;height:48px;border-radius:var(--rs);background:var(--bg-sec);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .hist-info{flex:1;min-width:0}
    .hist-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hist-meta{font-size:12px;color:var(--text-light);margin:2px 0}
    .hist-pills{display:flex;gap:4px;flex-wrap:wrap}
    .stat-card{background:var(--bg-off);border:1px solid var(--border-light);border-radius:var(--r);padding:14px;margin-bottom:10px}
    .stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    .stat-label{font-size:13px;color:var(--text-mid)}
    .stat-val{font-size:13px;font-weight:600}
    .zone-panel{border:1px solid var(--border-light);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
    .zp-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg-off);cursor:pointer}
    .zp-hdr h3{font-size:13px;font-weight:600}
    .zp-hdr .za{font-size:12px;color:var(--text-light)}
    .zp-body{display:none;padding:10px 14px}
    .zp-body.open{display:block}
    .saved-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-light)}
    .saved-info{flex:1}
    .saved-name{font-size:14px;font-weight:600}
    .saved-meta{font-size:12px;color:var(--text-light);margin-top:2px}
    .saved-actions{display:flex;gap:8px}
    .icon-btn{background:none;border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;cursor:pointer;font-size:13px;color:var(--text-mid)}
    .icon-btn.del{color:var(--red);border-color:#f0c0c0}
    .empty{text-align:center;padding:40px 16px;color:var(--text-light)}
    .empty i{font-size:32px;display:block;margin-bottom:10px}
    .empty p{font-size:14px}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1}
    .hidden{display:none!important}
    .slabel{font-size:13px;font-weight:600;margin-bottom:10px;margin-top:4px}
    .divider{border:none;border-top:1px solid var(--border-light);margin:16px 0}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:flex-end;justify-content:center}
    .modal{background:var(--bg);border-radius:var(--r) var(--r) 0 0;padding:24px 20px;width:100%;max-width:480px}
    .modal h3{font-size:16px;margin-bottom:8px}
    .modal p{font-size:13px;color:var(--text-mid);margin-bottom:18px}
    .modal-btns{display:flex;gap:10px}
    .modal-btns button{flex:1}
    .warn-box{background:#FFF8E1;border:1px solid #FFD54F;border-radius:var(--rs);padding:12px;margin-bottom:8px}
    .warn-box .wt{font-size:13px;font-weight:600;color:#5D4037;margin-bottom:4px}
    .warn-box .wb{font-size:12px;color:#6D4C41;line-height:1.5}
  </style>
</head>
<body>

<!-- SETUP -->
<div id="s-setup" class="screen active">
  <div style="margin-top:20px">
    <div class="logo">Plant<span>Score</span></div>
    <div class="tagline">Plant display audit tool</div>
    <div class="field"><label>Site name</label><input id="siteName" type="text" placeholder="e.g. Canary Wharf Office" autocomplete="off" /></div>
    <div class="field"><label>Initial zone / area</label><input id="zoneName" type="text" placeholder="e.g. Reception" autocomplete="off" /></div>
    <div class="field"><label>Auditor name</label><input id="auditorName" type="text" placeholder="Your name" autocomplete="off" /></div>
    <button class="btn btn-primary" onclick="startAudit()" style="margin-top:8px"><i class="fa-solid fa-leaf"></i> Start audit</button>
    <hr class="divider" />
    <div class="slabel"><i class="fa-solid fa-clock-rotate-left" style="margin-right:6px;color:var(--green)"></i>Resume a saved audit</div>
    <div id="setupSavedList"></div>
  </div>
</div>

<!-- MAIN -->
<div id="s-main" class="screen" style="padding-top:16px">

  <!-- AUDIT TAB -->
  <div id="tab-audit">
    <div class="hbar">
      <div class="hbar-left">
        <div class="site" id="hSite"></div>
        <div class="auditor" id="hAuditor"></div>
        <div class="ztag"><i class="fa-solid fa-location-dot" style="font-size:10px"></i><span id="hZone"></span></div>
      </div>
      <button class="btn-sm" onclick="toggleZoneRow()"><i class="fa-solid fa-arrows-rotate"></i> Zone</button>
    </div>
    <div id="zoneRow" class="zone-row hidden">
      <input id="newZone" placeholder="New zone name…" />
      <button onclick="changeZone()">Switch</button>
    </div>
    <div class="up-grid">
      <button class="up-btn" onclick="document.getElementById('camIn').click()"><i class="fa-solid fa-camera"></i> Take photo</button>
      <button class="up-btn" onclick="document.getElementById('fileIn').click()"><i class="fa-solid fa-upload"></i> Upload</button>
    </div>
    <input type="file" id="camIn" accept="image/*" capture="environment" multiple onchange="handleFiles(this.files)" />
    <input type="file" id="fileIn" accept="image/*" multiple onchange="handleFiles(this.files)" />
    <div id="thumbRow" class="thumb-row hidden"></div>
    <button id="assessBtn" class="btn btn-primary" onclick="runAssessment()" disabled>
      <i class="fa-solid fa-wand-magic-sparkles"></i> Assess images
    </button>
    <div id="resultsArea" style="margin-top:14px"></div>
    <div class="act-row">
      <button class="act-btn" onclick="doZoneEnd()"><i class="fa-solid fa-clipboard-list"></i> Zone summary</button>
      <button class="act-btn" onclick="doSiteEnd()"><i class="fa-solid fa-chart-bar"></i> Site summary</button>
    </div>
    <button class="btn btn-outline" style="margin-top:10px" onclick="toggleZoneRow()">
      <i class="fa-solid fa-arrows-rotate"></i> Switch zone
    </button>
    <div id="summaryArea" style="margin-top:14px"></div>
  </div>

  <!-- ZONES TAB -->
  <div id="tab-zones" class="hidden">
    <div class="hbar">
      <div class="hbar-left">
        <div class="site" id="zSite"></div>
        <div class="auditor">Zones</div>
      </div>
    </div>
    <div id="zonesList"></div>
  </div>

  <!-- NOTES TAB -->
  <div id="tab-notes" class="hidden">
    <div class="hbar">
      <div class="hbar-left">
        <div class="site" id="nSite"></div>
        <div class="auditor">Notes</div>
        <div class="ztag"><i class="fa-solid fa-location-dot" style="font-size:10px"></i><span id="nZone"></span></div>
      </div>
    </div>
    <div class="slabel">Add note for current zone</div>
    <textarea id="noteText" placeholder="Type a note…"></textarea>
    <button class="btn btn-primary" onclick="addNote()" style="margin-top:8px"><i class="fa-solid fa-plus"></i> Add note</button>
    <hr class="divider" />
    <div id="notesList"></div>
  </div>

  <!-- REPORT TAB -->
  <div id="tab-report" class="hidden">
    <div class="hbar">
      <div class="hbar-left">
        <div class="site" id="rSite"></div>
        <div class="auditor">Report</div>
      </div>
    </div>
    <div class="stat-card" id="reportStats"></div>
    <button class="btn btn-primary" onclick="exportPDF()"><i class="fa-solid fa-file-arrow-down"></i> Download PDF report</button>
    <div id="pdfStatus" style="margin-top:10px;font-size:12px;color:var(--text-light);text-align:center"></div>
    <hr class="divider" />
    <button class="btn btn-outline" onclick="doZoneEnd()"><i class="fa-solid fa-clipboard-list"></i> Zone summary</button>
    <button class="btn btn-outline" onclick="doSiteEnd()"><i class="fa-solid fa-chart-bar"></i> Site summary</button>
    <hr class="divider" />
    <button class="btn btn-outline" onclick="saveAudit()"><i class="fa-solid fa-floppy-disk"></i> Save &amp; resume later</button>
    <button class="btn btn-danger" onclick="confirmNewAudit()"><i class="fa-solid fa-plus"></i> New audit</button>
  </div>

</div>

<!-- NAV -->
<nav class="nav" id="mainNav">
  <button class="nav-btn active" id="nb-audit" onclick="switchTab('audit')"><i class="fa-solid fa-camera"></i>Audit</button>
  <button class="nav-btn" id="nb-zones" onclick="switchTab('zones')"><i class="fa-solid fa-layer-group"></i>Zones</button>
  <button class="nav-btn" id="nb-notes" onclick="switchTab('notes')"><i class="fa-solid fa-note-sticky"></i>Notes</button>
  <button class="nav-btn" id="nb-report" onclick="switchTab('report')"><i class="fa-solid fa-file-chart-column"></i>Report</button>
</nav>

<!-- MODAL -->
<div id="modal" class="modal-bg hidden">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalBody"></p>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalConfirm">Confirm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { jsPDF } = window.jspdf;
const API = '/api/messages';
const LS_KEY = 'plantscore_audits';
const IDB_NAME = 'PlantScoreDB';
const IDB_STORE = 'images';

// ── IndexedDB helpers ─────────────────────────────────────────────────────────
function openIDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    r.onsuccess = e => res(e.target.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbSet(key, val) {
  try {
    const db = await openIDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(val, key);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  } catch(e) { console.warn('IDB set failed', e); }
}
async function idbGet(key) {
  try {
    const db = await openIDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const r = tx.objectStore(IDB_STORE).get(key);
      r.onsuccess = () => res(r.result || null);
      r.onerror = () => rej(r.error);
    });
  } catch(e) { return null; }
}

// ── System prompt ─────────────────────────────────────────────────────────────
const SYSP = `You are a professional plant display auditor conducting a PlantScore audit.

SCORING SCALE:
1 = Very poor. Severely unhealthy, neglected, or near dead.
2 = Poor. Significant visible problems requiring urgent attention.
3 = Average. Some issues present but plant is functional and presentable.
4 = Good commercial quality. Healthy, well-maintained, presentable. THIS IS THE TARGET STANDARD.
5 = Exceptional / near perfect. Reserve only for outstanding specimens.

CALIBRATION:
- A healthy, well-presented plant in a professional setting scores 4. Default to 4, not lower.
- Only score below 3 if there is CLEAR, UNAMBIGUOUS visible evidence of serious problems.
- Do NOT penalise for image angle, lighting, or anything not directly visible.
- Score 0 is NEVER valid. Always give a score between 1 and 5.

MIXED PLANTERS:
- If the image shows multiple species in one container, assess it as a single display.
- Use PLANT_ID to name the dominant species only, or describe briefly e.g. "Mixed tropical display".
- Score the overall presentation as a whole. Do not refuse to score.
- Do not mention mixed planting in summaries unless directly relevant to a specific issue.

OUTPUT FORMAT — output ONLY the block below, with NO text before or after it:
---IMAGE_START---
PLANT_ID: [species name or brief display description]
HEALTH: [number 1-5, no text]
MAINTENANCE: [number 1-5, no text]
FORM: [number 1-5, no text]
OVERALL: [average of the three scores to 1 decimal place, no text]
ISSUES: [bullet list of visible issues, or the single word NONE]
RECS: [bullet list of recommendations ONLY if overall ≤3, otherwise the single word NONE]
---IMAGE_END---

CRITICAL: Output NOTHING except the block above. No preamble, no explanation, no commentary.`;

// ── State ─────────────────────────────────────────────────────────────────────
let S = {
  site:'', zone:'', auditor:'',
  pending:[], assessments:[], byZone:{},
  notes:{}, zoneSums:{}, siteSumText:'', counter:0
};

// ── Setup ─────────────────────────────────────────────────────────────────────
function startAudit() {
  const s = v('siteName'), z = v('zoneName'), a = v('auditorName');
  if (!s || !z || !a) { toast('Please fill in all fields'); return; }
  S = { site:s, zone:z, auditor:a, pending:[], assessments:[], byZone:{}, notes:{}, zoneSums:{}, siteSumText:'', counter:0 };
  refreshHeaders();
  document.getElementById('s-setup').classList.remove('active');
  document.getElementById('s-main').classList.add('active');
  document.getElementById('mainNav').classList.add('visible');
  switchTab('audit');
}
function v(id) { return document.getElementById(id).value.trim(); }
function refreshHeaders() {
  ['hSite','nSite','rSite','zSite'].forEach(id => setText(id, S.site + ' — ' + S.auditor));
  setText('hZone', S.zone); setText('nZone', S.zone);
  updateStats();
}
function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  ['audit','zones','notes','report'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab);
    document.getElementById('nb-'+t).classList.toggle('active', t === tab);
  });
  if (tab === 'zones') renderZones();
  if (tab === 'notes') renderNotes();
  if (tab === 'report') updateStats();
}

// ── Files ─────────────────────────────────────────────────────────────────────
function handleFiles(files) {
  for (const f of files) {
    const reader = new FileReader();
    reader.onload = e => {
      resizeImage(e.target.result, 1600, 0.88).then(({ b64, dataUrl }) => {
        S.pending.push({ b64, dataUrl });
        const img = document.createElement('img');
        img.src = dataUrl; img.className = 'thumb'; img.alt = 'Plant photo';
        const row = document.getElementById('thumbRow');
        row.appendChild(img); row.classList.remove('hidden');
        document.getElementById('assessBtn').disabled = false;
      });
    };
    reader.readAsDataURL(f);
  }
}
function resizeImage(dataUrl, maxPx, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const cw = Math.round(img.width * scale), ch = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = cw; canvas.height = ch;
      canvas.getContext('2d').drawImage(img, 0, 0, cw, ch);
      const resized = canvas.toDataURL('image/jpeg', quality);
      resolve({ b64: resized.split(',')[1], dataUrl: resized });
    };
    img.src = dataUrl;
  });
}

// ── Scoring helpers ───────────────────────────────────────────────────────────
function scCls(s) { return s >= 4 ? 'sh' : s >= 3.5 ? 'sm' : 'sl'; }
function ovCol(s) { return s >= 4 ? 'var(--green-dark)' : s >= 3.5 ? '#633806' : 'var(--red)'; }

// ── Parse API response ────────────────────────────────────────────────────────
function parseBlocks(text) {
  const blocks = text.split('---IMAGE_START---').slice(1);
  if (!blocks.length) return [{ parseError: true }];
  return blocks.map(block => {
    const c = block.split('---IMAGE_END---')[0].trim();
    const g = k => { const m = c.match(new RegExp(k + ':\\s*(.+)')); return m ? m[1].trim() : ''; };
    const health = parseFloat(g('HEALTH'));
    const maintenance = parseFloat(g('MAINTENANCE'));
    const form = parseFloat(g('FORM'));
    const overall = parseFloat(g('OVERALL'));
    const iss = g('ISSUES'), rec = g('RECS');
    const bad = isNaN(health) || isNaN(maintenance) || isNaN(form) || isNaN(overall)
             || health === 0 || maintenance === 0 || form === 0 || overall === 0;
    return {
      plantId: g('PLANT_ID') || 'Unknown',
      health: bad ? null : health,
      maintenance: bad ? null : maintenance,
      form: bad ? null : form,
      overall: bad ? null : overall,
      issues: iss === 'NONE' ? [] : iss.split(/[•\-\n]/).map(s => s.trim()).filter(Boolean),
      recs: rec === 'NONE' ? [] : rec.split(/[•\-\n]/).map(s => s.trim()).filter(Boolean),
      parseError: bad
    };
  });
}

// ── Assessment ────────────────────────────────────────────────────────────────
async function runAssessment() {
  if (!S.pending.length) return;
  const btn = document.getElementById('assessBtn');
  btn.disabled = true;
  const area = document.getElementById('resultsArea');
  const total = S.pending.length;
  const toProcess = [...S.pending];
  S.pending = [];
  document.getElementById('thumbRow').innerHTML = '';
  document.getElementById('thumbRow').classList.add('hidden');

  for (let i = 0; i < toProcess.length; i++) {
    const imgData = toProcess[i];
    const ld = mkLoader('Assessing image ' + (i+1) + ' of ' + total + '…');
    area.appendChild(ld);
    try {
      const resp = await fetch(API, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5', max_tokens: 1000, system: SYSP,
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imgData.b64 } },
            { type: 'text', text: 'Please assess this plant display.' }
          ]}]
        })
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      const results = parseBlocks(data.content.map(c => c.text || '').join(''));
      area.removeChild(ld);
      const r = results[0];
      if (r) {
        S.counter++;
        const entry = { ...r, dataUrl: imgData.dataUrl || null, imageNum: S.counter, zone: S.zone, ts: Date.now() };
        S.assessments.push(entry);
        if (!S.byZone[S.zone]) S.byZone[S.zone] = [];
        S.byZone[S.zone].push(entry);
        area.appendChild(buildCard(entry));
      }
    } catch(e) {
      area.removeChild(ld);
      area.insertAdjacentHTML('beforeend',
        `<div class="loading" style="color:var(--red)"><i class="fa-solid fa-circle-exclamation" style="font-size:20px;margin-bottom:6px;display:block"></i><p>Image ${i+1} failed: ${e.message}</p></div>`);
    }
  }
  btn.disabled = false;
  updateStats();
  autoSave();
}

function buildCard(e) {
  const d = document.createElement('div');
  d.className = 'card';
  if (e.parseError) {
    d.innerHTML = `
      ${e.dataUrl ? `<img src="${e.dataUrl}" class="card-img" alt="Plant image" />` : ''}
      <div class="img-num">Image ${e.imageNum}</div>
      <div class="warn-box">
        <div class="wt"><i class="fa-solid fa-triangle-exclamation" style="margin-right:6px"></i>Assessment format error</div>
        <div class="wb">The model returned an unexpected response. Tap Retry to try again.</div>
      </div>
      <button class="btn btn-outline" style="margin-top:0" onclick="retryAssessment(${e.imageNum - 1})">
        <i class="fa-solid fa-rotate-right"></i> Retry
      </button>`;
    return d;
  }
  d.innerHTML = `
    ${e.dataUrl ? `<img src="${e.dataUrl}" class="card-img" alt="${e.plantId}" />` : ''}
    <div class="img-num">Image ${e.imageNum}</div>
    <div class="plant-name">${e.plantId}</div>
    <div class="scores">
      <span class="sp ${scCls(e.health)}">Health ${e.health}/5</span>
      <span class="sp ${scCls(e.maintenance)}">Maintenance ${e.maintenance}/5</span>
      <span class="sp ${scCls(e.form)}">Form ${e.form}/5</span>
    </div>
    <div class="overall" style="color:${ovCol(e.overall)}">Overall: ${e.overall}/5</div>
    ${e.issues.length ? `<div class="ilbl">Issues observed</div><div class="ibody">${e.issues.map(x=>'• '+x).join('<br>')}</div>` : ''}
    ${e.recs.length ? `<div class="rbox"><div class="rlbl">Recommendations</div><div class="rbody">${e.recs.map(x=>'• '+x).join('<br>')}</div></div>` : ''}`;
  return d;
}

function mkLoader(msg) {
  const d = document.createElement('div');
  d.className = 'loading';
  d.innerHTML = `<div class="spinner"></div><p>${msg}</p>`;
  return d;
}

async function retryAssessment(idx) {
  const entry = S.assessments[idx];
  if (!entry || !entry.parseError || !entry.dataUrl) { toast('Please re-upload image to retry'); return; }
  const area = document.getElementById('resultsArea');
  const cards = area.querySelectorAll('.card');
  const target = Array.from(cards).find(c => c.querySelector('.img-num')?.textContent.includes('Image ' + entry.imageNum));
  const ld = mkLoader('Retrying image ' + entry.imageNum + '…');
  if (target) area.replaceChild(ld, target); else area.appendChild(ld);
  try {
    const resp = await fetch(API, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5', max_tokens: 1000, system: SYSP,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: entry.dataUrl.split(',')[1] } },
          { type: 'text', text: 'Please assess this plant display.' }
        ]}]
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const results = parseBlocks(data.content.map(c => c.text || '').join(''));
    const r = results[0];
    if (r && !r.parseError) {
      const updated = { ...entry, ...r, parseError: false };
      S.assessments[idx] = updated;
      if (S.byZone[entry.zone]) {
        const zi = S.byZone[entry.zone].findIndex(e => e.imageNum === entry.imageNum);
        if (zi !== -1) S.byZone[entry.zone][zi] = updated;
      }
      area.replaceChild(buildCard(updated), ld);
      updateStats(); autoSave();
      toast('Image ' + entry.imageNum + ' reassessed');
    } else throw new Error('Format error on retry');
  } catch(e) {
    const errDiv = mkLoader('Retry failed: ' + e.message);
    area.replaceChild(errDiv, ld);
  }
}

// ── Save / load ───────────────────────────────────────────────────────────────
function getSaved() { try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch(e) { return []; } }

async function autoSave() {
  if (!S.assessments.length) return;
  try { await persistAudit('autosave'); } catch(e) { console.warn('Auto-save failed', e); }
}

async function saveAudit() {
  if (!S.assessments.length) { toast('Nothing to save yet'); return; }
  try {
    const id = 'audit_' + Date.now();
    await persistAudit(id);
    toast('Audit saved');
    renderSetupSaved();
  } catch(e) { toast('Save failed: ' + (e.message || 'storage error')); }
}

async function persistAudit(id) {
  const audits = getSaved();
  const avg = (S.assessments.reduce((s,e) => s + e.overall, 0) / S.assessments.length).toFixed(1);
  // Save images to IndexedDB
  for (const entry of S.assessments) {
    if (entry.dataUrl) await idbSet('img_' + id + '_' + entry.imageNum, entry.dataUrl);
  }
  // Lean state for localStorage
  const lean = JSON.parse(JSON.stringify(S));
  lean.assessments = lean.assessments.map(e => ({ ...e, dataUrl: null }));
  Object.keys(lean.byZone).forEach(z => { lean.byZone[z] = lean.byZone[z].map(e => ({ ...e, dataUrl: null })); });
  const filtered = id === 'autosave' ? audits.filter(a => a.id !== 'autosave') : audits.filter(a => a.id !== id);
  filtered.unshift({ id, site: S.site, auditor: S.auditor, date: new Date().toISOString(), avg, zones: Object.keys(S.byZone).length, plants: S.assessments.length, isAutosave: id === 'autosave', state: lean });
  if (filtered.length > 20) filtered.length = 20;
  localStorage.setItem(LS_KEY, JSON.stringify(filtered));
}

async function loadAudit(id) {
  const audits = getSaved();
  const saved = audits.find(a => a.id === id);
  if (!saved) { toast('Audit not found'); return; }
  S = JSON.parse(JSON.stringify(saved.state));
  // Restore images from IndexedDB
  for (const entry of S.assessments) {
    const img = await idbGet('img_' + id + '_' + entry.imageNum);
    if (img) {
      entry.dataUrl = img;
      if (S.byZone[entry.zone]) {
        const ze = S.byZone[entry.zone].find(e => e.imageNum === entry.imageNum);
        if (ze) ze.dataUrl = img;
      }
    }
  }
  refreshHeaders();
  document.getElementById('resultsArea').innerHTML = '';
  document.getElementById('summaryArea').innerHTML = '';
  document.getElementById('thumbRow').innerHTML = '';
  document.getElementById('thumbRow').classList.add('hidden');
  document.getElementById('assessBtn').disabled = true;
  document.getElementById('s-setup').classList.remove('active');
  document.getElementById('s-main').classList.add('active');
  document.getElementById('mainNav').classList.add('visible');
  switchTab('zones');
  toast('Audit resumed: ' + saved.site);
}

function deleteSavedAudit(id) {
  showModal('Delete audit', 'Are you sure? This cannot be undone.', () => {
    const audits = getSaved().filter(a => a.id !== id);
    localStorage.setItem(LS_KEY, JSON.stringify(audits));
    renderSetupSaved(); toast('Audit deleted');
  });
}

  el.innerHTML = audits.map(a => {

    const badge = a.isAutosave ? '<span style="font-size:10px;background:var(--green-bg);color:var(--green-dark);padding:2px 6px;border-radius:10px;margin-left:6px;font-weight:600">AUTO</span>' : '';

        <div class="saved-name">${a.site}${badge}</div>
        <div class="saved-meta">${a.auditor} · ${date} · ${a.plants} plant${a.plants>1?'s':''} · ${a.zones} zone${a.zones>1?'s':''} · avg ${a.avg}/5</div>
      </div>
      <div class="saved-actions">
        <button class="icon-btn" onclick="loadAudit('${a.id}')" style="font-size:12px;padding:6px 12px"><i class="fa-solid fa-play" style="margin-right:4px"></i>Resume</button>
        <button class="icon-btn del" onclick="deleteSavedAudit('${a.id}')"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

// ── New audit ─────────────────────────────────────────────────────────────────
function confirmNewAudit() {
  showModal('Start new audit', 'This will clear the current audit. Save first if needed.', () => {
    S = { site:'', zone:'', auditor:'', pending:[], assessments:[], byZone:{}, notes:{}, zoneSums:{}, siteSumText:'', counter:0 };
    ['siteName','zoneName','auditorName'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('resultsArea').innerHTML = '';
    document.getElementById('summaryArea').innerHTML = '';
    document.getElementById('s-main').classList.remove('active');
    document.getElementById('mainNav').classList.remove('visible');
    document.getElementById('s-setup').classList.add('active');
    renderSetupSaved();
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(title, body, onConfirm) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = body;
  document.getElementById('modalConfirm').onclick = () => { closeModal(); onConfirm(); };
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── PDF export ────────────────────────────────────────────────────────────────
async function exportPDF() {
  const all = S.assessments;
  if (!all.length) { toast('No assessments to export'); return; }
  const status = document.getElementById('pdfStatus');
  status.textContent = 'Building PDF…';
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const ML=15,MR=15,MT=15,PW=210,CW=PW-ML-MR;
  let y = MT;
  const GREEN='#0F6E56',DARK='#1a1a1a',MID='#555',LIGHT='#888',RULE='#ddd',OFFBG='#f8f8f6';
  const chk = n => { if (y+n > 282) { doc.addPage(); y = MT; } };
  const rl = () => { doc.setDrawColor(RULE); doc.setLineWidth(0.2); doc.line(ML,y,PW-MR,y); };
  const scCol = s => s>=4?'#085041':s>=3.5?'#633806':'#791F1F';
  const scBg  = s => s>=4?'#E1F5EE':s>=3.5?'#FAEEDA':'#FCEBEB';

  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(DARK);
  doc.text('PlantScore Audit Report', ML, y); y+=8;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(LIGHT);
  doc.text('Site: '+S.site+'   Auditor: '+S.auditor+'   Zones: '+Object.keys(S.byZone).join(' · ')+'   Date: '+new Date().toLocaleDateString('en-GB'), ML, y); y+=5;
  rl(); y+=6;

  for (const zone of Object.keys(S.byZone)) {
    const es = S.byZone[zone];
    const za = (es.reduce((s,e)=>s+e.overall,0)/es.length).toFixed(1);
    chk(14);
    doc.setFillColor(OFFBG); doc.roundedRect(ML,y,CW,11,2,2,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(DARK); doc.text(zone, ML+4, y+7.5);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(MID);
    doc.text('Zone average: '+za+' / 5', PW-MR-4, y+7.5, {align:'right'}); y+=15;

    for (const e of es) {
      if (e.parseError) continue;
      const hasI=e.issues.length>0, hasR=e.recs.length>0;
      const tH=40+(hasI?e.issues.slice(0,4).length*4.5:0)+(hasR?e.recs.slice(0,3).length*4.5+8:0);
      const cH=Math.max(60,tH);
      chk(cH+6);
      doc.setDrawColor(RULE); doc.setLineWidth(0.2); doc.roundedRect(ML,y,CW,cH,2,2,'S');
      if (e.dataUrl) { try { doc.addImage(e.dataUrl,'JPEG',ML+3,y+3,34,cH-6,undefined,'FAST'); } catch(err){} }
      const tx=ML+40;
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(LIGHT); doc.text('Image '+e.imageNum, tx, y+6);
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(DARK);
      doc.text(doc.splitTextToSize(e.plantId, CW-tx+ML-4), tx, y+11);
      let px=tx;
      [['Health',e.health],['Maint.',e.maintenance],['Form',e.form]].forEach(([l,val])=>{
        const pw=27; doc.setFillColor(scBg(val)); doc.roundedRect(px,y+16,pw,6,1,1,'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(scCol(val));
        doc.text(l+' '+val+'/5', px+pw/2, y+20.2, {align:'center'}); px+=pw+2;
      });
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(scCol(e.overall));
      doc.text('Overall: '+e.overall+'/5', tx, y+30);
      let ty=y+36;
      if (hasI) {
        doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(MID); doc.text('Issues observed', tx, ty); ty+=4.5;
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(MID);
        e.issues.slice(0,4).forEach(iss=>{ const ls=doc.splitTextToSize('• '+iss,CW-tx+ML-5); doc.text(ls,tx,ty); ty+=ls.length*4; });
      }
      if (hasR) {
        ty+=2; doc.setFillColor('#f5f5f3'); doc.rect(tx-1,ty-2,CW-tx+ML-1,e.recs.slice(0,3).length*4+10,'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(DARK); doc.text('Recommendations', tx, ty+3); ty+=7;
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(MID);
        e.recs.slice(0,3).forEach(r=>{ const ls=doc.splitTextToSize('• '+r,CW-tx+ML-5); doc.text(ls,tx,ty); ty+=ls.length*4; });
      }
      y+=cH+5;
    }

    const zs = S.zoneSums[zone];
    if (zs) {
      chk(36);
      const obsL=doc.splitTextToSize(zs.obs||'',CW-8);
      const priL=zs.priority&&zs.priority!=='NONE'?doc.splitTextToSize(zs.priority,CW-8):[];
      const bh=14+obsL.length*4.5+(priL.length?priL.length*4+8:0);
      doc.setFillColor('#fafafa'); doc.setDrawColor(RULE); doc.setLineWidth(0.2); doc.roundedRect(ML,y,CW,bh,2,2,'FD');
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(DARK); doc.text('Zone summary', ML+4, y+7);
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(MID); doc.text(obsL, ML+4, y+13);
      if (priL.length) {
        const py=y+13+obsL.length*4.5+2;
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(DARK); doc.text('Priority actions', ML+4, py);
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(MID); doc.text(priL, ML+4, py+5);
      }
      y+=bh+6;
    }
    rl(); y+=6;
  }

  if (S.siteSumText) {
    const avg=(all.reduce((s,e)=>s+e.overall,0)/all.length).toFixed(1);
    chk(20);
    doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(DARK);
    doc.text('Final site summary — '+S.site, ML, y); y+=8;
    doc.setFontSize(24); doc.setTextColor(GREEN); doc.text(avg+' / 5', ML, y); y+=6;
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(LIGHT); doc.text('Site average score', ML, y); y+=10;
    const gf = k => { const m=S.siteSumText.match(new RegExp(k+':\\s*([\\s\\S]+?)(?=\\n[A-Z]+:|$)')); return m?m[1].trim():''; };
    [['Site-wide observations',gf('OBS')],['Priority actions',gf('PRIORITY')]].forEach(([title,body])=>{
      if (!body) return; chk(30);
      const lines=doc.splitTextToSize(body.replace(/\n/g,' '),CW-8);
      const bh=lines.length*4.5+14;
      doc.setFillColor('#fafafa'); doc.setDrawColor(RULE); doc.setLineWidth(0.2); doc.roundedRect(ML,y,CW,bh,2,2,'FD');
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(DARK); doc.text(title, ML+4, y+7);
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(MID); doc.text(lines, ML+4, y+13);
      y+=bh+5;
    });
  }

  const fname='PlantScore_'+S.site.replace(/\s+/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.pdf';
  doc.save(fname);
  status.innerHTML = '✓ Downloaded: '+fname+' &nbsp;<button onclick="switchTab(\'audit\')" style="font-size:12px;padding:5px 12px;background:var(--green);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;margin-left:4px">Back to audit</button>';
  toast('PDF saved');
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderSetupSaved();
</script>
</body>
</html>
